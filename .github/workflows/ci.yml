name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php: ['8.3', '8.4', '8.5']

        steps:
            - name: Set up PHP version ${{ matrix.php }}
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: ${{ matrix.php }}
                  tools: composer:v2

            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Validate composer.json
              run: composer validate --strict

            - name: Lint the PHP config factories
              run: composer ci:test:php:lint

            - name: Validate the JSON configs
              run: composer ci:test:json

            # The steps below install this package into a fixture project exactly the
            # way a real repository consumes it, then run each shared config against
            # the fixture source. This is what proves the relative `includes` in
            # base.neon resolve from an installed vendor layout, that every parameter
            # is schema-valid in Rector's PHPStan context too, and that the factories
            # return what the consumers expect.
            - name: Consumer smoke - install the package as a consumer would
              working-directory: tests/consumer
              run: composer install --prefer-dist --no-interaction --no-progress

            - name: Consumer smoke - PHPStan with the shared base config
              working-directory: tests/consumer
              run: vendor/bin/phpstan analyse --configuration phpstan.neon --memory-limit=-1 --error-format=github

            - name: Consumer smoke - php-cs-fixer with the shared ruleset
              working-directory: tests/consumer
              run: vendor/bin/php-cs-fixer fix --config .php-cs-fixer.dist.php --dry-run --diff

            - name: Consumer smoke - Rector with the shared rule sets
              working-directory: tests/consumer
              run: vendor/bin/rector process --config rector.php --dry-run
